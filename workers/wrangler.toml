name = "attractor-value-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
workers_dev = true

# Route API requests from custom domain to this Worker
routes = [
  { pattern = "odieseyeball.com/api/*", zone_name = "odieseyeball.com" }
]

[[d1_databases]]
binding = "DB"
database_name = "attractor-value-db"
database_id = "3a11e0b7-b010-4353-a539-68b462267be5"

[vars]
ENVIRONMENT = "production"

# Cron triggers for daily data refresh
[triggers]
crons = ["* * * * *"]  # Every minute: alternates between dailyRefresh and finnhubRefresh
